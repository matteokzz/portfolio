<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="responsive-template.css">
    <style>
        /* Color Palette:
           - fb3640: Red
           - 118ab2: Blue
           - 073b4c: Dark Blue
           - f5f5f5: White
           - f05d5e: Coral/Red
           - 191919: Carbon Black
        */

        /* Default: Dark Mode Styles */
        body {
            background-color: #191919;
            color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        /* Title Page Specific Styles */
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #191919;
        }

        .hero-content {
            text-align: center;
            color: #f5f5f5;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            color: #f5f5f5;
        }

        /* Phone Styles */
        @media only screen and (max-width: 576px) {
            .hero-title {
                font-size: 2rem;
            }
        }

        /* Laptop Styles */
        @media only screen and (min-width: 577px) and (max-width: 1024px) {
            .hero-title {
                font-size: 2.5rem;
            }
        }

        /* PC Styles */
        @media only screen and (min-width: 1025px) {
            .hero-title {
                font-size: 4rem;
            }
        }

        /* Dark Mode Toggle Button - Dark Mode (default) */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #f5f5f5;
            background-color: #333333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1000;
            padding: 0;
        }

        .theme-toggle:hover {
            background-color: #555555;
            transform: scale(1.1);
        }

        .theme-toggle img {
            display: block;
            filter: invert(1) grayscale(1);
        }

        /* Light Mode Styles */
        body.light-mode {
            background-color: #f5f5f5;
            color: #191919;
        }

        body.light-mode .hero-section {
            background-color: #f5f5f5;
        }

        body.light-mode .hero-content {
            color: #191919;
        }

        body.light-mode .hero-title {
            color: #191919;
        }

        body.light-mode .theme-toggle {
            border-color: #191919;
            background-color: #cccccc;
        }

        body.light-mode .theme-toggle:hover {
            background-color: #999999;
            border-color: #191919;
        }

/* scrolling words */
.wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  padding: 0 100px;
}

h1 {
  font-size: 64px;
  font-weight: 700;
  margin-right: 80px;
}

/* Scroll Snap Container */
.list {
  height: 140px;
  overflow-y: auto;
 
  scroll-snap-type: y mandatory;
scroll-behavior: smooth;

  list-style: none;
  padding: 0;
  margin: 0;
}

/* Hide scrollbar (optional) */
.list::-webkit-scrollbar {
  display: none;
}
.list {
  scrollbar-width: none;
}

/* Each word */
.list li {
  height: 140px;              /* must match container height */
  display: flex;
  align-items: center;

  font-size: 64px;
  font-weight: 600;

  scroll-snap-align: center;

  background-color: #f05d5e;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  opacity: 0.4;
  transition: opacity 0.3s ease;
}

/* Optional hover emphasis */
.list li:hover {
  opacity: 1;
}

/* Phone Styles */
@media only screen and (max-width: 576px) {
  .wrapper {
    flex-direction: column;
    padding: 0 20px;
  }
  
  h1 {
    font-size: 32px;
    margin-right: 0;
    margin-bottom: 20px;
  }
  
  .list {
    height: 70px;
  }
  
  .list li {
    height: 70px;
    font-size: 32px;
  }
}

/* Laptop Styles */
@media only screen and (min-width: 577px) and (max-width: 1024px) {
  .wrapper {
    padding: 0 60px;
  }
  
  h1 {
    font-size: 48px;
    margin-right: 50px;
  }
  
  .list {
    height: 100px;
  }
  
  .list li {
    height: 100px;
    font-size: 48px;
  }
}

/* PC/Desktop Styles */
@media only screen and (min-width: 1025px) {
  .wrapper {
    padding: 0 100px;
  }
  
  h1 {
    font-size: 64px;
    margin-right: 80px;
  }
  
  .list {
    height: 140px;
  }
  
  .list li {
    height: 140px;
    font-size: 64px;
  }
}
        
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
        <img id="theme-icon" src="icons/sun.svg" alt="Theme Toggle" width="24" height="24">
    </button>
    <div class="wrapper">
  <h1>You can</h1>

  <ul class="list">
    <li>break.</li>
    <li>learn.</li>
    <li>debug.</li>
    <li>refactor.</li>
    <li>optimize.</li>
    <li>deploy.</li>
    <li>monitor.</li>
  </ul>
</div>
    </section>

    <script>
        // Store theme preference
        let isLightMode = false;
        
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            
            isLightMode = !isLightMode;
            body.classList.toggle('light-mode');
            
            if (isLightMode) {
                // Switch to light mode
                icon.src = 'icons/moon.svg';
            } else {
                // Switch to dark mode
                icon.src = 'icons/sun.svg';
            }
        }
    </script>
</body>
</html>
